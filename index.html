<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vôlei Hub PRO - V1.1.0</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏐</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        /* Mantendo seu CSS Original */
        .jogador-card { touch-action: none; border: 2px solid transparent; transition: all 0.2s; cursor: pointer; position: relative; z-index: 10; user-select: none; }
        .sacando { border-color: #f59e0b !important; background-color: #2d3748 !important; box-shadow: 0 0 15px rgba(245, 158, 11, 0.4); }
        .is-estrela { border-right: 4px solid #f59e0b !important; }
        .is-elite { border-left: 4px solid #00d4ff !important; }
        .tab-active { background-color: #f59e0b !important; color: white !important; }
        .modal-global { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .config-input { background: #0f172a; border: 1px solid #334155; padding: 10px; border-radius: 12px; width: 100%; color: white; font-weight: bold; }
        .admin-only { display: none !important; }
        body.is-admin .admin-only { display: block !important; }
        .placar-oculto { opacity: 0; pointer-events: none; }
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
    </style>
</head>
<body class="pb-32">

    <header class="p-4 bg-slate-800 sticky top-0 shadow-2xl z-40 border-b border-slate-700">
        <div class="flex justify-between items-center max-w-md mx-auto mb-3">
            <h1 class="text-orange-500 font-black text-lg italic uppercase tracking-tighter">Vôlei Hub <span class="text-xs text-blue-400">PRO</span></h1>
            <div class="flex gap-2">
                <div id="admin-notif-bell" onclick="abrirSolicitacoes()" class="admin-only hidden relative cursor-pointer bg-slate-700 p-2 rounded-lg">
                    <span>🔔</span>
                    <span class="absolute -top-1 -right-1 bg-red-600 w-3 h-3 rounded-full border border-slate-900 animate-pulse"></span>
                </div>
                <button onclick="abrirConfig()" class="admin-only text-[10px] bg-slate-700 px-3 py-2 rounded-lg border border-slate-600 font-bold uppercase">⚙️ Menu</button>
            </div>
        </div>
        
        <div id="placarDisplay" class="flex justify-around items-center max-w-md mx-auto bg-slate-950 py-4 rounded-2xl border border-slate-800 shadow-lg transition-opacity duration-300">
            <div class="text-center w-2/5">
                <p class="text-[9px] uppercase text-blue-400 font-black mb-1">Time A</p>
                <div id="scoreA" class="text-6xl font-black">0</div>
            </div>
            <div class="text-slate-800 font-black text-xl italic">VS</div>
            <div class="text-center w-2/5">
                <p class="text-[9px] uppercase text-orange-400 font-black mb-1">Time B</p>
                <div id="scoreB" class="text-6xl font-black">0</div>
            </div>
        </div>
    </header>

    <main class="p-4 max-w-md mx-auto space-y-6">
        <div class="grid grid-cols-2 gap-3">
            <div id="areaA" class="space-y-2 min-h-[160px] bg-blue-900/10 rounded-xl p-2 border border-blue-500/20"></div>
            <div id="areaB" class="space-y-2 min-h-[160px] bg-orange-900/10 rounded-xl p-2 border border-orange-500/20"></div>
        </div>

        <section class="bg-slate-800/50 rounded-2xl border border-slate-700 overflow-hidden">
            <div class="p-3 bg-slate-800 border-b border-slate-700 flex gap-2">
                <button onclick="setFilaTab('geral')" id="tabGeral" class="tab-active text-[10px] font-black uppercase px-4 py-2 rounded-lg">Geral</button>
                <button onclick="setFilaTab('estrela')" id="tabEstrela" class="text-[10px] font-black uppercase px-4 py-2 rounded-lg">Estrelas ⭐</button>
            </div>
            <div id="esperaContainer" class="p-4 space-y-2 min-h-[100px]"></div>
        </section>

        <button onclick="abrirHistorico()" class="w-full bg-slate-800 border border-slate-700 text-blue-400 p-3 rounded-xl font-black uppercase text-[10px]">📜 Ver Histórico Recente</button>

        <section id="rankingSection" class="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden">
            <div class="p-4 bg-slate-800 border-b border-slate-800 text-center">
                <h2 class="text-xs font-black uppercase text-orange-500 italic mb-3 tracking-widest">🏆 Ranking Master</h2>
                <div class="flex gap-2">
                    <button onclick="setRankingTab('tudo')" id="rkTabTudo" class="tab-active flex-1 text-[9px] font-black uppercase py-2 rounded-lg">Tudo</button>
                    <button onclick="setRankingTab('geral')" id="rkTabGeral" class="flex-1 text-[9px] font-black uppercase py-2 rounded-lg">Geral</button>
                    <button onclick="setRankingTab('estrela')" id="rkTabEstrela" class="flex-1 text-[9px] font-black uppercase py-2 rounded-lg">Estrelas ⭐</button>
                </div>
            </div>
            <div id="rankingContainer" class="p-2 space-y-1"></div>
        </section>

        <section id="hallFamaSection" class="space-y-4 pb-20">
            <h2 class="text-xs font-black uppercase text-slate-500 text-center tracking-widest italic">⚡ Hall da Fama</h2>
            <div id="leadersGrid" class="space-y-3"></div>
        </section>
    </main>

    <div class="admin-only fixed bottom-6 left-4 right-4 flex gap-2 z-50">
        <button onclick="registrarPontoSimples('A')" class="flex-1 bg-blue-600 py-4 rounded-2xl font-black text-xs uppercase shadow-xl">Ponto A</button>
        <button onclick="registrarPontoSimples('B')" class="flex-1 bg-orange-600 py-4 rounded-2xl font-black text-xs uppercase shadow-xl">Ponto B</button>
    </div>

    <div id="modalConfig" class="modal-global hidden">
        <div class="bg-slate-900 w-full max-w-md rounded-3xl p-6 border-2 border-slate-700">
            <h2 class="text-xl font-black uppercase mb-6 text-center">Configurações</h2>
            <div class="space-y-4 mb-6">
                <div>
                    <label class="text-[10px] uppercase font-bold text-slate-500">Pontos do Set</label>
                    <input type="number" id="cPoints" class="config-input mt-1">
                </div>
                <button onclick="document.getElementById('placarDisplay').classList.toggle('placar-oculto')" class="w-full bg-slate-800 py-3 rounded-xl text-[10px] font-black border border-slate-700">👁️ ESCONDER PLACAR (PRINT)</button>
            </div>
            <div class="grid grid-cols-3 gap-2 mb-6">
                <span class="text-[8px] text-center uppercase">Ação</span>
                <span class="text-[8px] text-center uppercase">Geral</span>
                <span class="text-[8px] text-orange-400 text-center uppercase">Estrela</span>
                <span class="text-[10px]">Ataque</span>
                <input type="number" id="wAtqG" step="0.1" class="config-input py-1 text-xs">
                <input type="number" id="wAtqE" step="0.1" class="config-input py-1 text-xs">
                <span class="text-[10px]">Vitória</span>
                <input type="number" id="wVitG" step="0.1" class="config-input py-1 text-xs">
                <input type="number" id="wVitE" step="0.1" class="config-input py-1 text-xs">
            </div>
            <div class="flex gap-2">
                <button onclick="salvarConfig()" class="flex-1 bg-emerald-600 py-3 rounded-xl font-bold uppercase text-xs">Salvar</button>
                <button onclick="fecharModais()" class="flex-1 bg-slate-700 py-3 rounded-xl font-bold uppercase text-xs">Fechar</button>
            </div>
        </div>
    </div>

    <div id="modalHistorico" class="modal-global hidden">
        <div class="bg-slate-900 w-full max-w-md rounded-3xl p-6 border-2 border-blue-500 max-h-[80vh] overflow-y-auto">
            <h2 class="text-xl font-black text-blue-400 uppercase italic mb-4">Histórico</h2>
            <div id="listaHistorico" class="space-y-2"></div>
            <button onclick="fecharModais()" class="w-full bg-slate-800 p-3 rounded-xl mt-4 font-bold text-xs">FECHAR</button>
        </div>
    </div>

    <script>
        const ELITE_PLAYERS = ["Matheus Matos", "Odair", "Rafael", "Marciano", "Janir", "Lucas Primavera"];
        
        let game = {
            scoreA: 0, scoreB: 0,
            timeA: [], timeB: [],
            fila: ["p1","p2","p3","p4","p5","p6","p7","p8","p9","p10","p11","p12","p13","p14","p15","p16","p17","p18","p19","p20"],
            matchLog: [],
            solicitacoes: [],
            config: { cPoints: 12, cDesempate: '3direto' },
            weights: { atqG: 1, atqE: 1.5, vitG: 5, vitE: 10, err: 0.5 }, // PESOS INICIALIZADOS AQUI
            ranking: {
                "p1": { nome: "Daniele", estrela: true, ataques: 0, vitorias: 0 },
                "p2": { nome: "Edinho", estrela: false, ataques: 0, vitorias: 0 },
                "p3": { nome: "Júnior", estrela: false, ataques: 0, vitorias: 0 },
                "p4": { nome: "Hemily", estrela: true, ataques: 0, vitorias: 0 },
                "p5": { nome: "Ítalo", estrela: false, ataques: 0, vitorias: 0 },
                "p6": { nome: "Janir", estrela: false, ataques: 0, vitorias: 0 },
                "p7": { nome: "Kemilly", estrela: true, ataques: 0, vitorias: 0 },
                "p8": { nome: "Lucas Primavera", estrela: false, ataques: 0, vitorias: 0 },
                "p9": { nome: "Luiz Eduardo", estrela: false, ataques: 0, vitorias: 0 },
                "p10": { nome: "Maicon", estrela: false, ataques: 0, vitorias: 0 },
                "p11": { nome: "Marciano", estrela: false, ataques: 0, vitorias: 0 },
                "p12": { nome: "Mateus Braz", estrela: false, ataques: 0, vitorias: 0 },
                "p13": { nome: "Matheus Matos", estrela: false, ataques: 0, vitorias: 0 },
                "p14": { nome: "Odair", estrela: false, ataques: 0, vitorias: 0 },
                "p15": { nome: "Paty", estrela: true, ataques: 0, vitorias: 0 },
                "p16": { nome: "Rafael", estrela: false, ataques: 0, vitorias: 0 },
                "p17": { nome: "Rhuana", estrela: true, ataques: 0, vitorias: 0 },
                "p18": { nome: "Robson", estrela: false, ataques: 0, vitorias: 0 },
                "p19": { nome: "Samuel", estrela: false, ataques: 0, vitorias: 0 },
                "p20": { nome: "Yuri", estrela: false, ataques: 0, vitorias: 0 }
            }
        };

        let filaTab = 'geral';
        let rankingTab = 'tudo';

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('admin') === 'true') {
                const pass = prompt("🔐 Digite a Senha Admin:");
                if (pass === "5cat@mat") {
                    document.body.classList.add('is-admin');
                } else {
                    alert("Senha incorreta!");
                    window.location.href = window.location.pathname;
                }
            }
            const saved = localStorage.getItem('voleiHub_v12');
            if(saved) {
                const parsed = JSON.parse(saved);
                // Merge para garantir que novos campos (como weights) não quebrem
                game = { ...game, ...parsed };
                game.weights = parsed.weights || game.weights; 
            }
            renderTudo();
        };

        function falar(t) {
            if ('speechSynthesis' in window) {
                const u = new SpeechSynthesisUtterance(t);
                u.lang = 'pt-BR'; u.rate = 1.3;
                window.speechSynthesis.speak(u);
            }
        }

        function registrarPontoSimples(lado) {
            if (lado === 'A') game.scoreA++; else game.scoreB++;
            falar("Ponto Time " + lado);
            
            let limite = parseInt(game.config.cPoints);
            let alvo = (game.scoreA >= 11 && game.scoreB >= 11 && game.config.cDesempate === '3direto') ? 14 : limite;

            if (game.scoreA >= alvo || game.scoreB >= alvo) {
                finalizarSet(game.scoreA >= alvo ? 'A' : 'B');
            }
            salvar(); renderTudo();
        }

        function finalizarSet(v) {
            falar("Vitória do Time " + v);
            game.matchLog.push({
                res: `${game.scoreA}x${game.scoreB}`,
                data: new Date().toLocaleTimeString(),
                jogadores: [...game.timeA, ...game.timeB].map(id => game.ranking[id].nome)
            });

            const vIds = v === 'A' ? game.timeA : game.timeB;
            const pIds = v === 'A' ? game.timeB : game.timeA;

            // Lógica Dividir: Melhor+Pior vs 2º+3º
            let sorted = vIds.sort((a,b) => getScore(b) - getScore(a));
            game.timeA = [sorted[0], sorted[3]];
            game.timeB = [sorted[1], sorted[2]];

            game.fila.push(...pIds);
            
            // Puxar 4 novos da fila respeitando limite de 2 ELITES
            let eliteA = game.timeA.filter(id => ELITE_PLAYERS.includes(game.ranking[id].nome)).length;
            let eliteB = game.timeB.filter(id => ELITE_PLAYERS.includes(game.ranking[id].nome)).length;

            let filaTemp = [...game.fila];
            game.fila = [];

            for (let id of filaTemp) {
                let isE = ELITE_PLAYERS.includes(game.ranking[id].nome);
                if (game.timeA.length < 4) {
                    if (isE && eliteA >= 2) { game.fila.push(id); continue; }
                    game.timeA.push(id); if(isE) eliteA++;
                } else if (game.timeB.length < 4) {
                    if (isE && eliteB >= 2) { game.fila.push(id); continue; }
                    game.timeB.push(id); if(isE) eliteB++;
                } else {
                    game.fila.push(id);
                }
            }
            game.scoreA = 0; game.scoreB = 0;
            salvar(); renderTudo();
        }

        function renderTudo() {
            document.getElementById('scoreA').innerText = game.scoreA;
            document.getElementById('scoreB').innerText = game.scoreB;

            const areaA = document.getElementById('areaA'); areaA.innerHTML = '';
            game.timeA.forEach(id => areaA.innerHTML += card(id));
            const areaB = document.getElementById('areaB'); areaB.innerHTML = '';
            game.timeB.forEach(id => areaB.innerHTML += card(id));

            const fCont = document.getElementById('esperaContainer'); fCont.innerHTML = '';
            let fFiltro = game.fila.filter(id => filaTab === 'estrela' ? game.ranking[id].estrela : !game.ranking[id].estrela);
            fFiltro.forEach(id => fCont.innerHTML += `<div class="bg-slate-800 p-3 rounded-xl border border-slate-700 text-xs">${game.ranking[id].nome}</div>`);

            const rCont = document.getElementById('rankingContainer'); rCont.innerHTML = '';
            Object.keys(game.ranking).sort((a,b) => getScore(b) - getScore(a)).forEach(id => {
                const p = game.ranking[id];
                if (rankingTab === 'estrela' && !p.estrela) return;
                if (rankingTab === 'geral' && p.estrela) return;
                const isE = ELITE_PLAYERS.includes(p.nome);
                rCont.innerHTML += `
                    <div class="flex justify-between items-center bg-slate-800 p-3 rounded-xl border border-slate-700 ${p.estrela?'is-estrela':''} ${isE?'is-elite':''}">
                        <span class="text-xs font-bold">${isE?'💎':''} ${p.estrela?'⭐':''} ${p.nome}</span>
                        <div class="flex gap-4">
                            <span class="text-emerald-400 font-black text-xs">${getScore(id).toFixed(1)}</span>
                            <button onclick="solicitarBloqueio('${id}')" class="opacity-20">🚫</button>
                        </div>
                    </div>`;
            });
            renderHallFama();
        }

        function card(id) {
            const p = game.ranking[id];
            const isE = ELITE_PLAYERS.includes(p.nome);
            return `<div onclick="acaoJogador('${id}')" class="jogador-card bg-slate-800 p-4 rounded-xl text-center text-xs font-black border-slate-700 ${isE?'is-elite':''}">${p.nome}</div>`;
        }

        function acaoJogador(id) {
            if(!document.body.classList.contains('is-admin')) return;
            game.ranking[id].ataques++;
            falar("Ataque de " + game.ranking[id].nome);
            salvar(); renderTudo();
        }

        function getScore(id) {
            const p = game.ranking[id];
            const w = game.weights || { atqG:1, atqE:1.5, vitG:5, vitE:10 };
            if(!p) return 0;
            return p.estrela ? (p.ataques * w.atqE + p.vitorias * w.vitE) : (p.ataques * w.atqG + p.vitorias * w.vitG);
        }

        function renderHallFama() {
            const g = document.getElementById('leadersGrid'); g.innerHTML = '';
            const top = Object.keys(game.ranking).sort((a,b) => getScore(b) - getScore(a))[0];
            if(top) {
                g.innerHTML += `<div class="bg-gradient-to-r from-orange-600 to-yellow-500 p-4 rounded-2xl text-center">
                    <p class="text-[9px] font-black uppercase italic">Dono da Quadra</p>
                    <p class="text-lg font-black">${game.ranking[top].nome}</p>
                </div>`;
            }
        }

        function abrirConfig() { 
            document.getElementById('cPoints').value = game.config.cPoints;
            document.getElementById('wAtqG').value = game.weights.atqG;
            document.getElementById('wAtqE').value = game.weights.atqE;
            document.getElementById('wVitG').value = game.weights.vitG;
            document.getElementById('wVitE').value = game.weights.vitE;
            document.getElementById('modalConfig').classList.remove('hidden'); 
        }

        function salvarConfig() {
            game.config.cPoints = document.getElementById('cPoints').value;
            game.weights.atqG = parseFloat(document.getElementById('wAtqG').value);
            game.weights.atqE = parseFloat(document.getElementById('wAtqE').value);
            game.weights.vitG = parseFloat(document.getElementById('wVitG').value);
            game.weights.vitE = parseFloat(document.getElementById('wVitE').value);
            salvar(); fecharModais(); renderTudo();
        }

        function abrirHistorico() {
            const c = document.getElementById('listaHistorico'); c.innerHTML = '';
            [...game.matchLog].reverse().forEach(l => {
                c.innerHTML += `<div class="bg-slate-800 p-3 rounded-xl border border-slate-700 text-[10px]"><span class="text-blue-400 font-bold">${l.res}</span> - ${l.jogadores.join(', ')}</div>`;
            });
            document.getElementById('modalHistorico').classList.remove('hidden');
        }

        function abrirSolicitacoes() { alert("Nenhuma solicitação pendente."); }
        function solicitarBloqueio(id) {
            if(document.body.classList.contains('is-admin')) {
                delete game.ranking[id];
            } else {
                game.solicitacoes.push(id);
                document.getElementById('admin-notif-bell').classList.remove('hidden');
                alert("Bloqueio solicitado ao Admin.");
            }
            salvar(); renderTudo();
        }

        function salvar() { localStorage.setItem('voleiHub_v12', JSON.stringify(game)); }
        function fecharModais() { document.querySelectorAll('.modal-global').forEach(m => m.classList.add('hidden')); }
        function setFilaTab(t) { filaTab = t; renderTudo(); }
        function setRankingTab(t) { rankingTab = t; renderTudo(); }
    </script>
</body>
</html>
