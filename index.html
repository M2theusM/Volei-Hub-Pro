<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vôlei Hub PRO - V11.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .jogador-card { touch-action: none; border: 2px solid transparent; transition: all 0.2s; cursor: pointer; position: relative; z-index: 10; user-select: none; }
        .is-estrela { border-right: 4px solid #f59e0b !important; }
        .is-elite { border-left: 4px solid #00d4ff !important; }
        .modal-global { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
        .config-input { background: #1e293b; border: 1px solid #334155; color: white; padding: 8px; border-radius: 8px; width: 100%; text-align: center; font-weight: bold; }
        body { background-color: #0f172a; color: white; font-family: system-ui, -apple-system, sans-serif; overscroll-behavior: none; }
        .is-admin .admin-only { display: flex !important; }
        .admin-only { display: none !important; }
        #placarDisplay.oculto { opacity: 0; pointer-events: none; }
    </style>
</head>
<body class="p-4 pb-24">

    <header class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-2xl font-black italic tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-yellow-200">VÔLEI HUB <span class="text-white">PRO</span></h1>
            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Pimenta Bueno - RO</p>
        </div>
        <div class="flex gap-3 items-center">
            <div id="admin-notif-bell" class="hidden relative cursor-pointer" onclick="abrirSolicitacoes()">
                <span class="absolute -top-1 -right-1 bg-red-600 w-3 h-3 rounded-full border-2 border-slate-900 animate-pulse"></span>
                <span class="text-xl">🔔</span>
            </div>
            <button onclick="abrirConfig()" class="bg-slate-800 p-2 rounded-xl border border-slate-700">⚙️</button>
        </div>
    </header>

    <div id="placarDisplay" class="bg-slate-800 rounded-3xl p-6 border-b-4 border-slate-700 shadow-2xl mb-6 transition-all duration-300">
        <div class="flex justify-between items-center">
            <div class="text-center flex-1">
                <span class="text-[10px] font-black uppercase text-blue-400 tracking-widest mb-1 block">Time A</span>
                <div id="scoreA" class="text-6xl font-black tabular-nums">00</div>
            </div>
            <div class="px-4 text-slate-600 font-black text-2xl italic">VS</div>
            <div class="text-center flex-1">
                <span class="text-[10px] font-black uppercase text-orange-400 tracking-widest mb-1 block">Time B</span>
                <div id="scoreB" class="text-6xl font-black tabular-nums">00</div>
            </div>
        </div>
    </div>

    <div class="space-y-4 mb-8">
        <div id="quadraA" class="grid grid-cols-2 gap-3 p-4 bg-blue-900/20 rounded-2xl border border-blue-500/30 min-h-[100px]"></div>
        <div class="flex justify-center -my-6 relative z-20">
            <div class="bg-slate-700 px-6 py-1 rounded-full text-[10px] font-black uppercase border-2 border-slate-800">Rede</div>
        </div>
        <div id="quadraB" class="grid grid-cols-2 gap-3 p-4 bg-orange-900/20 rounded-2xl border border-orange-500/30 min-h-[100px]"></div>
    </div>

    <div class="admin-only fixed bottom-6 left-4 right-4 flex gap-2 z-50">
        <button onclick="registrarPontoSimples('A', true)" class="flex-1 bg-blue-600 py-4 rounded-2xl font-black text-sm uppercase shadow-lg active:scale-95">Ponto A</button>
        <button onclick="registrarPontoSimples('B', true)" class="flex-1 bg-orange-600 py-4 rounded-2xl font-black text-sm uppercase shadow-lg active:scale-95">Ponto B</button>
    </div>

    <div class="space-y-4">
        <button onclick="abrirHistorico()" class="w-full bg-slate-800 border border-slate-700 text-blue-400 p-3 rounded-xl font-black uppercase text-[10px]">📜 Histórico de Partidas</button>
        
        <section class="bg-slate-900 rounded-3xl border border-slate-800 p-5">
            <h3 class="text-xs font-black uppercase tracking-widest text-emerald-400 mb-4">Ranking Master</h3>
            <div id="listaRanking" class="space-y-2"></div>
        </section>

        <section class="bg-slate-900 rounded-3xl border border-slate-800 p-5 mb-12">
            <h3 class="text-xs font-black uppercase tracking-widest text-blue-400 mb-4 italic">Próximos na Fila</h3>
            <div id="listaFila" class="space-y-2"></div>
        </section>
    </div>

    <div id="modalHistorico" class="modal-global hidden">
        <div class="bg-slate-900 w-full max-w-md rounded-3xl p-6 border-2 border-blue-500 max-h-[80vh] overflow-y-auto">
            <h2 class="text-xl font-black text-blue-400 uppercase italic mb-4">Histórico</h2>
            <div id="conteudoHistorico" class="space-y-3"></div>
            <button onclick="fecharModais()" class="w-full bg-slate-800 p-3 rounded-xl mt-4 font-bold uppercase text-[10px]">Fechar</button>
        </div>
    </div>

    <div id="modalConfig" class="modal-global hidden">
        <div class="bg-slate-900 w-full max-w-md rounded-3xl p-6 border-2 border-slate-700">
            <h2 class="text-xl font-black uppercase italic mb-4">Configurações</h2>
            <div class="space-y-4 mb-6">
                <input type="number" id="cPoints" class="config-input" placeholder="Pontos do Set">
                <select id="cDesempate" class="config-input">
                    <option value="3direto">Desempate: 3 Diretos (pós 11x11)</option>
                    <option value="normal">Diferença de 2</option>
                </select>
                <button onclick="document.getElementById('placarDisplay').classList.toggle('oculto')" class="w-full bg-slate-800 py-3 rounded-xl text-[10px] font-black uppercase border border-slate-700">👁️ Esconder Placar p/ Print</button>
            </div>
            <div class="grid grid-cols-3 gap-2 mb-6">
                <div class="text-[8px] text-center">PESOS</div>
                <div class="text-[8px] text-center">GERAL</div>
                <div class="text-[8px] text-center text-orange-400">ESTRELA</div>
                <div>Ataque</div> <input type="number" id="wAtqG" step="0.1" class="config-input py-1 text-xs"> <input type="number" id="wAtqE" step="0.1" class="config-input py-1 text-xs">
                <div>Vitória</div> <input type="number" id="wVitG" step="0.1" class="config-input py-1 text-xs"> <input type="number" id="wVitE" step="0.1" class="config-input py-1 text-xs">
            </div>
            <button onclick="salvarConfig()" class="w-full bg-emerald-600 py-3 rounded-xl font-bold uppercase text-xs">Salvar Alterações</button>
        </div>
    </div>

    <script>
        const ELITE_PLAYERS = ["Matheus Matos", "Odair", "Rafael", "Marciano", "Janir", "Lucas Primavera"];
        
        // BANCO DE DADOS INICIAL COM SEUS JOGADORES
        let game = {
            scoreA: 0, scoreB: 0,
            timeA: [], timeB: [],
            matchLog: [],
            config: {
                cPoints: 12, cDesempate: '3direto',
                weights: { atqG: 1, atqE: 1.5, vitG: 5, vitE: 10 }
            },
            ranking: {
                "p1": { nome: "Daniele", estrela: true, ataques: 0, vitorias: 0 },
                "p2": { nome: "Edinho", estrela: false, ataques: 0, vitorias: 0 },
                "p3": { nome: "Júnior", estrela: false, ataques: 0, vitorias: 0 },
                "p4": { nome: "Hemily", estrela: true, ataques: 0, vitorias: 0 },
                "p5": { nome: "Ítalo", estrela: false, ataques: 0, vitorias: 0 },
                "p6": { nome: "Janir", estrela: false, ataques: 0, vitorias: 0 },
                "p7": { nome: "Kemilly", estrela: true, ataques: 0, vitorias: 0 },
                "p8": { nome: "Lucas Primavera", estrela: false, ataques: 0, vitorias: 0 },
                "p9": { nome: "Luiz Eduardo", estrela: false, ataques: 0, vitorias: 0 },
                "p10": { nome: "Maicon", estrela: false, ataques: 0, vitorias: 0 },
                "p11": { nome: "Marciano", estrela: false, ataques: 0, vitorias: 0 },
                "p12": { nome: "Mateus Braz", estrela: false, ataques: 0, vitorias: 0 },
                "p13": { nome: "Matheus Matos", estrela: false, ataques: 0, vitorias: 0 },
                "p14": { nome: "Odair", estrela: false, ataques: 0, vitorias: 0 },
                "p15": { nome: "Paty", estrela: true, ataques: 0, vitorias: 0 },
                "p16": { nome: "Rafael", estrela: false, ataques: 0, vitorias: 0 },
                "p17": { nome: "Rhuana", estrela: true, ataques: 0, vitorias: 0 },
                "p18": { nome: "Robson", estrela: false, ataques: 0, vitorias: 0 },
                "p19": { nome: "Samuel", estrela: false, ataques: 0, vitorias: 0 },
                "p20": { nome: "Yuri", estrela: false, ataques: 0, vitorias: 0 }
            },
            fila: ["p1","p2","p3","p4","p5","p6","p7","p8","p9","p10","p11","p12","p13","p14","p15","p16","p17","p18","p19","p20"]
        };

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('admin') === 'true') {
                const pass = prompt("🔐 Chave de acesso:");
                if (pass === "5cat@mat") document.body.classList.add('is-admin');
                else window.location.href = window.location.pathname;
            }
            const local = localStorage.getItem('voleiHubSeed');
            if(local) game = JSON.parse(local);
            renderTudo();
        };

        function narrar(t) {
            if ('speechSynthesis' in window) {
                const u = new SpeechSynthesisUtterance(t);
                u.lang = 'pt-BR'; u.rate = 1.3;
                window.speechSynthesis.speak(u);
            }
        }

        function registrarPontoSimples(lado, manual) {
            if (lado === 'A') game.scoreA++; else game.scoreB++;
            if(manual) narrar(lado === 'A' ? "Ponto Time A" : "Ponto Time B");
            atualizarPlacar();
            verificarFimSet();
            salvar();
        }

        function verificarFimSet() {
            let pLimite = parseInt(game.config.cPoints);
            let alvo = pLimite;
            if (game.config.cDesempate === '3direto') {
                if (game.scoreA >= (pLimite-1) && game.scoreB >= (pLimite-1)) alvo = (pLimite-1) + 3;
            }
            if (game.scoreA >= alvo) finalizarSet('A');
            else if (game.scoreB >= alvo) finalizarSet('B');
        }

        function finalizarSet(v) {
            narrar("Fim de set. Vitória do time " + v);
            game.matchLog.push({
                data: new Date().toLocaleString(),
                placar: `${game.scoreA} x ${game.scoreB}`,
                timeA: game.timeA.map(id => game.ranking[id].nome),
                timeB: game.timeB.map(id => game.ranking[id].nome)
            });

            const vencedores = v === 'A' ? game.timeA : game.timeB;
            const perdedores = v === 'A' ? game.timeB : game.timeA;

            // Lógica Dividir e Balancear Score
            let vSorted = vencedores.sort((a,b) => getScore(b) - getScore(a));
            let baseA = [vSorted[0], vSorted[3]];
            let baseB = [vSorted[1], vSorted[2]];

            game.fila.push(...perdedores);
            let { nA, nB, fR } = puxarComElite(game.fila);
            
            game.timeA = [...baseA, ...nA];
            game.timeB = [...baseB, ...nB];
            game.fila = fR;
            game.scoreA = 0; game.scoreB = 0;
            renderTudo();
        }

        function puxarComElite(f) {
            let nA = [], nB = [], fR = [], eA = 0, eB = 0;
            for(let id of f) {
                let isE = ELITE_PLAYERS.includes(game.ranking[id].nome);
                if(nA.length < 2) {
                    if(isE && eA >= 2) { fR.push(id); continue; }
                    nA.push(id); if(isE) eA++;
                } else if(nB.length < 2) {
                    if(isE && eB >= 2) { fR.push(id); continue; }
                    nB.push(id); if(isE) eB++;
                } else fR.push(id);
            }
            return { nA, nB, fR };
        }

        function getScore(id) {
            const p = game.ranking[id]; const w = game.config.weights;
            return p.estrela ? (p.ataques * w.atqE + p.vitorias * w.vitE) : (p.ataques * w.atqG + p.vitorias * w.vitG);
        }

        function renderTudo() {
            const r = document.getElementById('listaRanking'); r.innerHTML = '';
            Object.keys(game.ranking).forEach(id => {
                const p = game.ranking[id];
                const isE = ELITE_PLAYERS.includes(p.nome);
                r.innerHTML += `
                    <div class="flex justify-between items-center bg-slate-800 p-3 rounded-xl border border-slate-700 ${p.estrela?'is-estrela':''} ${isE?'is-elite':''}">
                        <span class="text-xs font-bold">${isE?'💎':''} ${p.estrela?'⭐':''} ${p.nome}</span>
                        <span class="text-[10px] text-emerald-400 font-black">${getScore(id).toFixed(1)}</span>
                    </div>`;
            });
            const qA = document.getElementById('quadraA'); qA.innerHTML = '';
            game.timeA.forEach(id => qA.innerHTML += card(id));
            const qB = document.getElementById('quadraB'); qB.innerHTML = '';
            game.timeB.forEach(id => qB.innerHTML += card(id));
            const f = document.getElementById('listaFila'); f.innerHTML = '';
            game.fila.forEach(id => f.innerHTML += `<div class="bg-slate-800 p-2 rounded-lg text-[10px]">${game.ranking[id].nome}</div>`);
            atualizarPlacar();
        }

        function card(id) {
            const p = game.ranking[id];
            return `<div class="jogador-card bg-slate-800 p-3 rounded-xl text-center text-[10px] font-black">${p.nome}</div>`;
        }

        function atualizarPlacar() {
            document.getElementById('scoreA').innerText = game.scoreA.toString().padStart(2,'0');
            document.getElementById('scoreB').innerText = game.scoreB.toString().padStart(2,'0');
        }

        function salvar() { localStorage.setItem('voleiHubSeed', JSON.stringify(game)); }
        function abrirHistorico() {
            const c = document.getElementById('conteudoHistorico'); c.innerHTML = '';
            [...game.matchLog].reverse().forEach(l => {
                c.innerHTML += `<div class="bg-slate-800 p-3 rounded-xl border border-slate-700 text-[10px]">
                    <div class="text-blue-400 font-black mb-1">${l.placar} - ${l.data}</div>
                    <div class="opacity-50">Time A: ${l.timeA.join(', ')}</div>
                    <div class="opacity-50">Time B: ${l.timeB.join(', ')}</div>
                </div>`;
            });
            document.getElementById('modalHistorico').classList.remove('hidden');
        }
        function abrirConfig() { document.getElementById('modalConfig').classList.remove('hidden'); }
        function fecharModais() { document.querySelectorAll('.modal-global').forEach(m => m.classList.add('hidden')); }
        function salvarConfig() {
            game.config.cPoints = document.getElementById('cPoints').value || 12;
            game.config.cDesempate = document.getElementById('cDesempate').value;
            salvar(); fecharModais();
        }
    </script>
</body>
</html>
