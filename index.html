<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vôlei Hub PRO - V12.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: system-ui, -apple-system, sans-serif; overscroll-behavior: none; }
        .jogador-card { transition: all 0.2s; cursor: pointer; user-select: none; }
        .is-estrela { border-right: 4px solid #f59e0b !important; }
        .is-elite { border-left: 4px solid #00d4ff !important; }
        .modal-global { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(8px); }
        .config-input { background: #1e293b; border: 1px solid #334155; color: white; padding: 10px; border-radius: 12px; width: 100%; text-align: center; font-weight: bold; }
        .is-admin .admin-only { display: flex !important; }
        .admin-only { display: none !important; }
        .placar-hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body class="p-4 pb-28">

    <header class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-2xl font-black italic tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">VÔLEI HUB <span class="text-white">PRO</span></h1>
            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Pimenta Bueno - RO</p>
        </div>
        <div class="flex gap-3">
            <div id="bell" class="hidden relative cursor-pointer" onclick="verSolicitacoes()">
                <span class="absolute -top-1 -right-1 bg-red-600 w-3 h-3 rounded-full animate-pulse border-2 border-slate-900"></span>
                <span class="text-xl">🔔</span>
            </div>
            <button onclick="abrirConfig()" class="bg-slate-800 p-2 rounded-xl border border-slate-700 shadow-lg">⚙️</button>
        </div>
    </header>

    <div id="placarDisplay" class="bg-slate-800 rounded-3xl p-6 border-b-4 border-slate-700 shadow-2xl mb-6 transition-all duration-500">
        <div class="flex justify-between items-center">
            <div class="text-center flex-1">
                <span class="text-[10px] font-black uppercase text-blue-400 tracking-widest mb-1 block">Time A</span>
                <div id="scoreA" class="text-6xl font-black tabular-nums">00</div>
            </div>
            <div class="px-4 text-slate-600 font-black text-2xl italic">VS</div>
            <div class="text-center flex-1">
                <span class="text-[10px] font-black uppercase text-orange-400 tracking-widest mb-1 block">Time B</span>
                <div id="scoreB" class="text-6xl font-black tabular-nums">00</div>
            </div>
        </div>
    </div>

    <div class="space-y-4 mb-10">
        <div id="quadraA" class="grid grid-cols-2 gap-3 p-4 bg-blue-900/10 rounded-2xl border border-blue-500/20 min-h-[120px]"></div>
        <div class="flex justify-center -my-7 relative z-20">
            <div class="bg-slate-700 px-8 py-1.5 rounded-full text-[10px] font-black uppercase border-2 border-slate-900 shadow-2xl">Rede</div>
        </div>
        <div id="quadraB" class="grid grid-cols-2 gap-3 p-4 bg-orange-900/10 rounded-2xl border border-orange-500/20 min-h-[120px]"></div>
    </div>

    <div class="space-y-4">
        <button onclick="abrirHistorico()" class="w-full bg-slate-800 border border-slate-700 text-blue-400 p-4 rounded-2xl font-black uppercase text-[10px] shadow-lg active:scale-95 transition">📜 Histórico de Partidas</button>
        
        <section class="bg-slate-900 rounded-3xl border border-slate-800 p-5 shadow-xl">
            <h3 class="text-xs font-black uppercase tracking-widest text-emerald-400 mb-4 flex justify-between">
                Ranking Master <span>PONTOS</span>
            </h3>
            <div id="listaRanking" class="space-y-2"></div>
        </section>

        <section class="bg-slate-900 rounded-3xl border border-slate-800 p-5 mb-16 shadow-xl">
            <h3 class="text-xs font-black uppercase tracking-widest text-blue-400 mb-4 italic">Fila de Espera</h3>
            <div id="listaFila" class="space-y-2"></div>
        </section>
    </div>

    <div class="admin-only fixed bottom-6 left-4 right-4 flex gap-3 z-50">
        <button onclick="marcarPonto('A')" class="flex-1 bg-blue-600 py-5 rounded-2xl font-black text-xs uppercase shadow-2xl shadow-blue-900/50 active:scale-90">Ponto A</button>
        <button onclick="marcarPonto('B')" class="flex-1 bg-orange-600 py-5 rounded-2xl font-black text-xs uppercase shadow-2xl shadow-orange-900/50 active:scale-90">Ponto B</button>
    </div>

    <div id="modalHistorico" class="modal-global hidden">
        <div class="bg-slate-900 w-full max-w-md rounded-3xl p-6 border-2 border-blue-500 max-h-[85vh] overflow-y-auto">
            <h2 class="text-xl font-black text-blue-400 uppercase italic mb-6">Partidas Recentes</h2>
            <div id="conteudoHistorico" class="space-y-3"></div>
            <button onclick="fecharModais()" class="w-full bg-slate-800 p-4 rounded-2xl mt-6 font-bold uppercase text-xs">Voltar</button>
        </div>
    </div>

    <div id="modalConfig" class="modal-global hidden">
        <div class="bg-slate-900 w-full max-w-md rounded-3xl p-6 border-2 border-slate-700">
            <h2 class="text-xl font-black uppercase mb-6">Ajustes</h2>
            <div class="space-y-4 mb-6">
                <div>
                    <label class="text-[9px] font-bold text-slate-500 uppercase ml-2">Pontos do Set</label>
                    <input type="number" id="cPoints" class="config-input mt-1">
                </div>
                <button onclick="document.getElementById('placarDisplay').classList.toggle('placar-hidden')" class="w-full bg-slate-800 py-4 rounded-2xl text-[10px] font-black uppercase border border-slate-700">👁️ Ocultar Placar (Print)</button>
            </div>
            
            <h3 class="text-[10px] font-black text-emerald-400 uppercase mb-3">Pesos por Categoria</h3>
            <div class="grid grid-cols-3 gap-2 mb-6 text-center">
                <span class="text-[8px] opacity-50">AÇÃO</span>
                <span class="text-[8px] opacity-50">GERAL</span>
                <span class="text-[8px] text-orange-400">ESTRELA</span>
                
                <span class="text-[10px] py-2">Ataque</span>
                <input type="number" id="wAtqG" step="0.1" class="config-input py-1.5 text-xs">
                <input type="number" id="wAtqE" step="0.1" class="config-input py-1.5 text-xs">

                <span class="text-[10px] py-2">Vitória</span>
                <input type="number" id="wVitG" step="0.1" class="config-input py-1.5 text-xs">
                <input type="number" id="wVitE" step="0.1" class="config-input py-1.5 text-xs">
            </div>

            <button onclick="salvarConfig()" class="w-full bg-emerald-600 py-4 rounded-2xl font-bold uppercase text-xs shadow-lg">Salvar Configurações</button>
        </div>
    </div>

    <script>
        const ELITE = ["Matheus Matos", "Odair", "Rafael", "Marciano", "Janir", "Lucas Primavera"];
        
        let game = {
            scoreA: 0, scoreB: 0,
            timeA: [], timeB: [],
            matchLog: [],
            solicitacoes: [],
            config: {
                cPoints: 12,
                weights: { atqG: 1.0, atqE: 1.5, vitG: 5.0, vitE: 10.0 }
            },
            ranking: {
                "p1": { nome: "Daniele", estrela: true, ataques: 0, vitorias: 0 },
                "p2": { nome: "Edinho", estrela: false, ataques: 0, vitorias: 0 },
                "p3": { nome: "Júnior", estrela: false, ataques: 0, vitorias: 0 },
                "p4": { nome: "Hemily", estrela: true, ataques: 0, vitorias: 0 },
                "p5": { nome: "Ítalo", estrela: false, ataques: 0, vitorias: 0 },
                "p6": { nome: "Janir", estrela: false, ataques: 0, vitorias: 0 },
                "p7": { nome: "Kemilly", estrela: true, ataques: 0, vitorias: 0 },
                "p8": { nome: "Lucas Primavera", estrela: false, ataques: 0, vitorias: 0 },
                "p9": { nome: "Luiz Eduardo", estrela: false, ataques: 0, vitorias: 0 },
                "p10": { nome: "Maicon", estrela: false, ataques: 0, vitorias: 0 },
                "p11": { nome: "Marciano", estrela: false, ataques: 0, vitorias: 0 },
                "p12": { nome: "Mateus Braz", estrela: false, ataques: 0, vitorias: 0 },
                "p13": { nome: "Matheus Matos", estrela: false, ataques: 0, vitorias: 0 },
                "p14": { nome: "Odair", estrela: false, ataques: 0, vitorias: 0 },
                "p15": { nome: "Paty", estrela: true, ataques: 0, vitorias: 0 },
                "p16": { nome: "Rafael", estrela: false, ataques: 0, vitorias: 0 },
                "p17": { nome: "Rhuana", estrela: true, ataques: 0, vitorias: 0 },
                "p18": { nome: "Robson", estrela: false, ataques: 0, vitorias: 0 },
                "p19": { nome: "Samuel", estrela: false, ataques: 0, vitorias: 0 },
                "p20": { nome: "Yuri", estrela: false, ataques: 0, vitorias: 0 }
            },
            fila: ["p1","p2","p3","p4","p5","p6","p7","p8","p9","p10","p11","p12","p13","p14","p15","p16","p17","p18","p19","p20"]
        };

        // --- SEGURANÇA E INICIALIZAÇÃO ---
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('admin') === 'true') {
                const pass = prompt("🔐 Área Restrita. Senha:");
                if (pass === "5cat@mat") {
                    document.body.classList.add('is-admin');
                } else {
                    alert("Acesso Negado!");
                    window.location.href = window.location.pathname;
                }
            }
            const data = localStorage.getItem('voleiHub_v12');
            if(data) game = JSON.parse(data);
            render();
        };

        function falar(texto) {
            const msg = new SpeechSynthesisUtterance(texto);
            msg.lang = 'pt-BR';
            msg.rate = 1.3;
            window.speechSynthesis.speak(msg);
        }

        // --- LOGICA DE PONTOS E DESEMPATE ---
        function marcarPonto(lado) {
            if(lado === 'A') game.scoreA++; else game.scoreB++;
            falar("Ponto Time " + lado);
            
            let limite = parseInt(game.config.cPoints);
            // Regra Desempate 11x11 -> 14
            let alvo = (game.scoreA >= 11 && game.scoreB >= 11) ? 14 : limite;

            document.getElementById('scoreA').innerText = game.scoreA.toString().padStart(2,'0');
            document.getElementById('scoreB').innerText = game.scoreB.toString().padStart(2,'0');

            if(game.scoreA >= alvo || game.scoreB >= alvo) {
                finalizarSet(game.scoreA >= alvo ? 'A' : 'B');
            }
            salvar();
        }

        function finalizarSet(v) {
            falar("Fim de set. Vitória do time " + v);
            
            const vIds = v === 'A' ? game.timeA : game.timeB;
            const pIds = v === 'A' ? game.timeB : game.timeA;

            game.matchLog.push({
                res: `${game.scoreA}x${game.scoreB}`,
                venc: v,
                data: new Date().toLocaleTimeString(),
                jogadores: [...game.timeA, ...game.timeB].map(id => game.ranking[id].nome)
            });

            // Balanceamento: Melhor+Pior vs 2º+3º
            let vSorted = vIds.sort((a,b) => getScore(b) - getScore(a));
            let baseA = [vSorted[0], vSorted[3]]; 
            let baseB = [vSorted[1], vSorted[2]];

            // Adiciona perdedores na fila
            game.fila.push(...pIds);
            
            // Puxa da fila respeitando limite de 2 ELITES
            let { nA, nB, fR } = organizarFila(game.fila);
            
            game.timeA = [...baseA, ...nA];
            game.timeB = [...baseB, ...nB];
            game.fila = fR;
            game.scoreA = 0; game.scoreB = 0;
            render();
        }

        function organizarFila(f) {
            let nA = [], nB = [], fR = [], elA = 0, elB = 0;
            for(let id of f) {
                let isEl = ELITE.includes(game.ranking[id].nome);
                if(nA.length < 2) {
                    if(isEl && elA >= 2) { fR.push(id); continue; }
                    nA.push(id); if(isEl) elA++;
                } else if(nB.length < 2) {
                    if(isEl && elB >= 2) { fR.push(id); continue; }
                    nB.push(id); if(isEl) elB++;
                } else fR.push(id);
            }
            return { nA, nB, fR };
        }

        function getScore(id) {
            const p = game.ranking[id]; const w = game.config.weights;
            return p.estrela ? (p.ataques * w.atqE + p.vitorias * w.vitE) : (p.ataques * w.atqG + p.vitorias * w.vitG);
        }

        // --- RENDERIZAÇÃO ---
        function render() {
            const r = document.getElementById('listaRanking'); r.innerHTML = '';
            Object.keys(game.ranking)
                .sort((a,b) => getScore(b) - getScore(a))
                .forEach(id => {
                    const p = game.ranking[id];
                    const isEl = ELITE.includes(p.nome);
                    r.innerHTML += `
                        <div class="flex justify-between items-center bg-slate-800 p-4 rounded-2xl border border-slate-700 ${p.estrela?'is-estrela':''} ${isEl?'is-elite':''}">
                            <span class="text-xs font-bold">${isEl?'💎':''} ${p.estrela?'⭐':''} ${p.nome}</span>
                            <div class="flex gap-4 items-center">
                                <span class="text-[10px] text-emerald-400 font-black">${getScore(id).toFixed(1)}</span>
                                <button onclick="bloquear('${id}')" class="opacity-20 hover:opacity-100">🚫</button>
                            </div>
                        </div>`;
                });

            const qA = document.getElementById('quadraA'); qA.innerHTML = '';
            game.timeA.forEach(id => qA.innerHTML += card(id));
            const qB = document.getElementById('quadraB'); qB.innerHTML = '';
            game.timeB.forEach(id => qB.innerHTML += card(id));

            const fl = document.getElementById('listaFila'); fl.innerHTML = '';
            game.fila.forEach(id => fl.innerHTML += `<div class="bg-slate-800 p-3 rounded-xl text-[10px] border border-slate-700/50">${game.ranking[id].nome}</div>`);
            
            document.getElementById('scoreA').innerText = game.scoreA.toString().padStart(2,'0');
            document.getElementById('scoreB').innerText = game.scoreB.toString().padStart(2,'0');
        }

        function card(id) {
            const p = game.ranking[id];
            return `<div onclick="acao('${id}')" class="jogador-card bg-slate-800 p-4 rounded-2xl text-center text-[10px] font-black shadow-lg border border-slate-700">${p.nome}</div>`;
        }

        function acao(id) {
            if(!document.body.classList.contains('is-admin')) return;
            game.ranking[id].ataques++;
            falar("Ataque de " + game.ranking[id].nome);
            salvar(); render();
        }

        function bloquear(id) {
            if(!document.body.classList.contains('is-admin')) {
                game.solicitacoes.push(id);
                document.getElementById('bell').classList.remove('hidden');
                alert("Solicitação enviada ao Admin!");
            } else {
                alert("Jogador bloqueado pelo Admin.");
            }
            salvar();
        }

        function abrirHistorico() {
            const c = document.getElementById('conteudoHistorico'); c.innerHTML = '';
            [...game.matchLog].reverse().forEach(l => {
                c.innerHTML += `<div class="bg-slate-800 p-4 rounded-2xl border border-slate-700">
                    <div class="flex justify-between text-blue-400 font-black mb-2">
                        <span>${l.res}</span> <span class="text-[9px] opacity-50">${l.data}</span>
                    </div>
                    <div class="text-[10px] opacity-70 leading-relaxed">${l.jogadores.join(' • ')}</div>
                </div>`;
            });
            document.getElementById('modalHistorico').classList.remove('hidden');
        }

        function salvar() { localStorage.setItem('voleiHub_v12', JSON.stringify(game)); }
        function fecharModais() { document.querySelectorAll('.modal-global').forEach(m => m.classList.add('hidden')); }
        function abrirConfig() { 
            const w = game.config.weights;
            document.getElementById('cPoints').value = game.config.cPoints;
            document.getElementById('wAtqG').value = w.atqG; document.getElementById('wAtqE').value = w.atqE;
            document.getElementById('wVitG').value = w.vitG; document.getElementById('wVitE').value = w.vitE;
            document.getElementById('modalConfig').classList.remove('hidden'); 
        }
        function salvarConfig() {
            game.config.cPoints = document.getElementById('cPoints').value;
            game.config.weights.atqG = parseFloat(document.getElementById('wAtqG').value);
            game.config.weights.atqE = parseFloat(document.getElementById('wAtqE').value);
            salvar(); fecharModais(); render();
        }
    </script>
</body>
</html>
